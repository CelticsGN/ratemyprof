services:
  # Backend API Service
  - type: web
    name: ratemyprof-backend
    env: python
    region: singapore  # Choose: oregon, frankfurt, singapore
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: cd backend && uvicorn src.main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    
    envVars:
      # Supabase Configuration
      - key: SUPABASE_URL
        sync: false  # Set manually in Render dashboard
      - key: SUPABASE_KEY
        sync: false
      
      # JWT Configuration
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: JWT_EXPIRATION_MINUTES
        value: 10080  # 7 days
      
      # CORS Configuration
      - key: ALLOWED_ORIGINS
        value: http://localhost:3000,https://yourdomain.com,https://www.yourdomain.com
      
      # Database Configuration
      - key: DATABASE_URL
        sync: false  # Set to your Supabase Postgres URL
      
      # Python Version
      - key: PYTHON_VERSION
        value: 3.11.0
      
      # Security
      - key: DOCS_ENABLED
        value: true
      - key: AUTO_BAN_ENABLED
        value: true
      
      # Environment
      - key: ENVIRONMENT
        value: production
