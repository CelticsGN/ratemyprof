name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-site
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Clear npm cache
      run: npm cache clean --force
    
    - name: Install dependencies
      run: npm install --legacy-peer-deps
    
    - name: Lint
      run: npm run lint || true
    
    - name: Build
      run: npm run build
    
    - name: Upload build artifacts
      uses: actions/upload-artifact@v3
      with:
        name: frontend-dist
        path: landing-site/dist

  backend-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./landing-site-backend
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
        cache: 'npm'
        cache-dependency-path: landing-site-backend/package-lock.json
    
    - name: Install dependencies
      run: npm ci
    
    - name: Setup Prisma
      run: npx prisma generate
    
    - name: Run tests
      run: npm test || true
    
    - name: Test server health
      run: |
        npm run dev &
        sleep 5
        curl http://localhost:3000/api/health || true
        kill %1
